; arm_controller – PlatformIO project
; Firmware for the robotic arm: joints, gripper, limit switches, encoders.
; Build: pio run   Upload: pio run -t upload   Monitor: pio device monitor

[env:mega2560]
platform = atmelavr
board = megaatmega2560
framework = arduino
monitor_speed = 115200
build_flags = -DARM_CONTROLLER

[env:nucleo_f446re]
platform = ststm32
board = nucleo_f446re
framework = arduino
monitor_speed = 115200
build_flags = -DARM_CONTROLLER

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
build_flags = -DARM_CONTROLLER
