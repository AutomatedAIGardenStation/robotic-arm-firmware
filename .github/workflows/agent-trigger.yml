name: Agent Task Trigger

on:
  issues:
    types: [labeled]

jobs:
  trigger-agent:
    if: github.event.label.name == 'agent-queue'
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch Task to Orchestrator
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.REPO_ACCESS_TOKEN }}
          script: |
            await github.rest.repos.createDispatchEvent({
              owner: 'AutomatedAIGardenStation',
              repo: 'pipeline-orchestrator',
              event_type: 'agent-issue-created',
              client_payload: {
                target_repo: context.repo.repo,
                issue_number: context.payload.issue.number
              }
            });
            console.log(`🚀 Dispatched issue #${context.payload.issue.number} from ${context.repo.repo} to pipeline-orchestrator`);
