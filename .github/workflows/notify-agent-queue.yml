name: Notify agent queue

on:
  issues:
    types: [labeled]

jobs:
  dispatch:
    if: github.event.label.name == 'agent-queue'
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch agent-issue-created to pipeline-orchestrator
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.REPO_ACCESS_TOKEN }}
          script: |
            await github.rest.repos.createDispatchEvent({
              owner: 'AutomatedAIGardenStation',
              repo: 'pipeline-orchestrator',
              event_type: 'agent-issue-created',
              client_payload: {
                target_repo: 'arm-controller',
                issue_number: context.payload.issue.number
              }
            });
            console.log('Dispatched agent-issue-created for issue #' + context.payload.issue.number);
